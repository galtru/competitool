# Seed taxonomy for cust_params key classification.
# Add keys here to extend without changing code.
# Each category has:
#   exact:          case-insensitive exact key matches
#   prefix_patterns: key startswith any of these (case-insensitive)
#   suffix_patterns: key endswith any of these (case-insensitive)

content_identity:
  exact:
    - article_id
    - nws_id
    - nwsctr_id
    - source_id
    - content_id
    - cms_id
    - video_id
    - story_id
    - post_id
    - asset_id
  prefix_patterns: []
  suffix_patterns:
    - _id

content_taxonomy:
  exact:
    - vertical
    - themes
    - category
    - section
    - program
    - tags
    - topic
    - iab_cat
    - genre
    - subcategory
    - channel
    - series
  prefix_patterns:
    - iab_
    - cat_
  suffix_patterns:
    - _category
    - _taxonomy
    - _topic

content_attributes:
  exact:
    - article_type
    - page
    - page_type
    - content_type
    - display_mode
    - isBreakingNews
