services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    command: /app/entrypoints/api.sh
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - artifacts:/app/artifacts
      - db_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    shm_size: '2gb'   # Chromium needs large /dev/shm; default 64MB causes crashes

  worker:
    build: .
    command: /app/entrypoints/worker.sh
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - artifacts:/app/artifacts
      - db_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    shm_size: '2gb'

volumes:
  redis_data:
  artifacts:
  db_data:
